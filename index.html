<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="qPZm4fxiKKbI104H265akqVPuJ5yiBZ__NupWcv2YnY" />
    <!-- App Logo -->
    <link href="../clipboard-list-solid.svg" rel="icon" />
    <title>Taskiva-Todo-App</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <!-- fontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- main css link -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="todo-container">
        <p class="date">Date & Time</p>
        <div class="card" style="width: 18rem;">
            <h3 style="margin: 10px;">Taskiva <i class="fas fa-clipboard-list" style="color: #FF5733;"></i></h3>
            <div class="card-body">
                <input type="text" name="todo" placeholder="Add Your List" class="todo-input" /><button>ADD</button>
            </div>
        </div>
    </div>

    <!-- bootstrap javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>

    <!-- main js -->
    <script src="script.js"></script>
</body>

</html>
